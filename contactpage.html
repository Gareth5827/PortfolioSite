<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Gareth Horne · Contact</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @font-face {
      font-family: 'Tektur';
      src: url('fonts/Tektur/Tektur-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    
    @font-face {
      font-family: 'Tektur';
      src: url('fonts/Tektur/Tektur-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }

    @font-face {
      font-family: 'Pencil';
      src: url('fonts/pencil_2/Pencil-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }

    body {
      font-family: 'Pencil', Arial, sans-serif;
      background: black;
      overflow-x: hidden;
    }

    .main-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100px;
      background: #681E29;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 80px;
      z-index: 1000;
    }

    .main-header a {
      text-decoration: none;
      color: white;
      font-size: 50pt;
      font-family: 'Tektur', Arial, sans-serif;
      font-weight: 400;
      line-height: 1;
      display: inline-block;
      transition: color 0.2s ease;
    }

    .main-header a:hover {
      color: #34cbbf;
    }

    .page-content {
      padding-top: 100px;
    }

    .page-section {
      width: 100%;
      min-height: calc(100vh - 100px);
      background-color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: 'Pencil', Arial, sans-serif;
      font-size: 40pt;
      text-align: center;
      padding: 40px;
    }

    .email-link {
      color: #68aa55;
      text-decoration: underline;
      font-size: 36pt;
      margin-top: 20px;
      display: block;
    }
  </style>
</head>
<body>
  <header class="main-header">
    <a href="index.html">Home</a>
    <a href="gamepage.html">Games</a>
    <a href="voicepage.html">Voices</a>
    <a href="esportpage.html">Esports</a>
    <a href="contactpage.html">Contact</a>
  </header>

  <div class="page-content">
    <section class="page-section">
      <div>
        <h1>Contact</h1>
        <p style="font-size: 24pt; margin-top: 20px;">Get in touch!</p>
        <a href="mailto:Gareth_Horne@Outlook.com" class="email-link">Gareth_Horne@Outlook.com</a>
      </div>
    </section>
  </div>
</body>
</html>
