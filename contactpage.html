<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Gareth Horne · Contact</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ----- Tektur Font ----- */
    @font-face {
      font-family: 'Tektur';
      src: url('./fonts/tektur/Tektur-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    
    @font-face {
      font-family: 'Tektur';
      src: url('./fonts/tektur/Tektur-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }

    @font-face {
      font-family: 'Pencil';
      src: url('fonts/pencil_2/Pencil-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }

    /* ----- Handwriting Font ----- */
    @font-face {
      font-family: 'HW';
      src: url('fonts/handwriting_3/Handwriting.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }

    body {
      font-family: 'Pencil', Arial, sans-serif;
      background: black;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
    }

    .main-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100px;
      background: #681E29;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 80px;
      z-index: 1000;
    }

    .main-header a {
      text-decoration: none;
      color: white;
      font-size: 50pt;
      font-family: 'Tektur', Arial, sans-serif;
      font-weight: 400;
      line-height: 1;
      display: inline-block;
      transition: color 0.2s ease;
    }

    .main-header a:hover {
      color: #34cbbf;
    }

    .page-content {
      padding-top: 100px;
      position: relative;
      width: 100%;
      min-height: calc(100vh - 100px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Background image */
    .contact-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.70;  /* Changed from 0.75 to 0.60 */
      transition: opacity 0.6s ease;
      z-index: 0;
    }
    
    .contact-bg.typing {
      opacity: 0.85;
      transition: opacity 0.2s ease;
    }

    .contact-form-container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .contact-text {
      font-size: 64pt;  /* Increased from 48pt */
      font-family: 'Pencil', Arial, sans-serif;
      color: white;
      margin-bottom: 50px;
      text-align: center;
    }

    .oneliner-text {
      font-size: 34pt;
      font-family: 'Pencil', Arial, sans-serif;
      color: white;
      margin-bottom: 50px;  /* Reduced from 150px */
      text-align: center;
    }
    
    .form-fields {
      display: flex;
      flex-wrap: nowrap;  /* Changed from wrap to nowrap to keep on same line */
      justify-content: center;
      gap: 30px;
      width: 450px;
      margin-bottom: 30px;
    }

    .input-field {
      background-color: #edf46e;
      border: 4px solid #aaf46e;  /* Changed from 7px to 4px */
      border-radius: 15px;
      padding: 10px 15px;
      font-family: 'HW', Arial, sans-serif;  /* Changed to HW font */
      font-size: 24pt;
      color: black;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .input-field:focus {
      border-color: #8cd46e;
    }

    .input-field::placeholder {
      color: #3f79c0;
      opacity: 0.8;
      font-size: 24pt;
      font-family: 'HW', Arial, sans-serif;  /* Changed to HW font */
    }

    #emailBox {
      width: 520px;
      height: 50px;
    }

    #subjectBox {
      width: 520px;
      height: 50px;
    }

    #messageBox {
      width: 1000px;
      height: 400px;
      resize: none;
    }

    .send-btn {
      background-color: #edf46e;
      color: black;
      border: none;
      font-size: 24pt;
      font-family: 'HW', Arial, sans-serif;  /* Changed to HW font */
      font-weight: bold;
      padding: 15px 50px;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 30px;
    }

    .send-btn:hover {
      background-color: #e5ed4a;
    }

    .char-count {
      color: white;
      font-family: 'HW', Arial, sans-serif;  /* Changed to HW font */
      font-size: 18pt;
      margin-top: 10px;
      text-align: right;
      width: 450px;
    }

    .char-count.over-limit {
      color: #ff6b6b;
    }
  </style>
</head>
<body>
  <header class="main-header">
    <a href="index.html">Home</a>
    <a href="gamepage.html">Games</a>
    <a href="voicepage.html">Voices</a>
    <a href="esportpage.html">Esports</a>
    <a href="contactpage.html">Contact</a>
  </header>

  <div class="page-content">
    <img src="Images/contactBG.png" alt="Contact Background" class="contact-bg" id="contactBg">
    
    <div class="contact-form-container">
      <div class="contact-text">Contact</div>
      <div class="oneliner-text">Don't be formal, be yourself. Talk soon!</div>
      
      <div class="form-fields">
        <input type="email" class="input-field" id="emailBox" placeholder="Yourname@email.com">
        <input type="text" class="input-field" id="subjectBox" placeholder="Yo!">
      </div>
      
      <textarea class="input-field" id="messageBox" placeholder="Yo Gareth!&#10;I wanted to shoot you a message to say what's up and I love your ideas!" maxlength="600"></textarea>
      
      <div class="char-count" id="charCount">0 / 600</div>
      
      <button class="send-btn" id="sendButton">Send!</button>
    </div>
  </div>

  <script>
    (function() {
      // ----- Sample Data -----
      const sampleEmails = [
        "Yourname@email.com",
        "AwesomeEmail@Site.com",
        "Something@Something.Something"
      ];
      
      const sampleSubjects = [
        "Yo!",
        "I wanna talk business",
        "Can you help with my game?",
        "love your stuff man!",
        "wanna cast for our event"
      ];
      
      const sampleMessages = [
        "Yo Gareth!\nI wanted to shoot you a message to say what's up and I love your ideas!",
        "Hello Gareth,\nI wanted to ask you about your Esports casting. My team and I are running an event and we would like you to be on the broadcast.\nAll the best,\nName",
        "Hey man!\nCan we do a Zoom or Teams call and talk about games?\nCheers,\nName"
      ];
      
      // ----- Random Selection -----
      function getRandomItem(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }
      
      // ----- DOM Elements -----
      const emailBox = document.getElementById('emailBox');
      const subjectBox = document.getElementById('subjectBox');
      const messageBox = document.getElementById('messageBox');
      const sendButton = document.getElementById('sendButton');
      const contactBg = document.getElementById('contactBg');
      const charCount = document.getElementById('charCount');
      
      // ----- Set Initial Placeholders -----
      const initialEmail = getRandomItem(sampleEmails);
      const initialSubject = getRandomItem(sampleSubjects);
      const initialMessage = getRandomItem(sampleMessages);
      
      emailBox.placeholder = initialEmail;
      subjectBox.placeholder = initialSubject;
      messageBox.placeholder = initialMessage;
      
      // ----- Character Counter -----
      function updateCharCount() {
        const length = messageBox.value.length;
        const maxLength = 500;
        charCount.textContent = length + " / " + maxLength;
        
        if (length > maxLength) {
          charCount.classList.add('over-limit');
        } else {
          charCount.classList.remove('over-limit');
        }
      }
      
      messageBox.addEventListener('input', updateCharCount);
      
      // ----- Background Opacity on Typing -----
      let typingTimeout;
      
      function setTypingBackground() {
        contactBg.classList.add('typing');
        
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
          contactBg.classList.remove('typing');
        }, 200);
      }
      
      emailBox.addEventListener('input', setTypingBackground);
      subjectBox.addEventListener('input', setTypingBackground);
      messageBox.addEventListener('input', setTypingBackground);
      
      // ----- Send Button Logic -----
      sendButton.addEventListener('click', function() {
        const emailValue = emailBox.value.trim();
        const subjectValue = subjectBox.value.trim();
        const messageValue = messageBox.value.trim();
        
        // Check if fields are empty
        if (!emailValue || emailValue === initialEmail) {
          alert("Please fill out the email field!");
          return;
        }
        
        if (!subjectValue || subjectValue === initialSubject) {
          alert("Please fill out the subject field!");
          return;
        }
        
        if (!messageValue || messageValue === initialMessage) {
          alert("Please fill out the message field!");
          return;
        }
        
        // Check character limit
        if (messageValue.length > 500) {
          alert("Message is too long! Please keep it under 500 characters.");
          return;
        }
        
        // If all checks pass
        alert("Message sent successfully! (This is a demo - no actual email was sent)");
        
        // Clear fields
        emailBox.value = "";
        subjectBox.value = "";
        messageBox.value = "";
        updateCharCount();
      });
      
      // Initialize character count
      updateCharCount();
      
    })();
  </script>
</body>
</html>
